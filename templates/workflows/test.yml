name: Test

# Single-purpose, reusable (workflow_call): the test suite across the supported
# matrix (OS x Node), where cross-environment bugs actually surface. The matrix
# earns its cost here (unlike biome/typecheck) — package.json `engines: node >=20`.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    if: github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22, 24]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
