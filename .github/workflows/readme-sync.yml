name: Sync README

# Auto-regenerate README.md feature table and skills section on every push to
# main. If the generated output differs from what's committed, push an auto-commit
# so the README never drifts from the source of truth (features.ts + SKILL.md).

on:
  push:
    branches: [main]
    paths:
      - "src/core/catalog/features.ts"
      - "src/skills/**/SKILL.md"
      - "src/scripts/generateReadme.mjs"

permissions:
  contents: write

jobs:
  sync-readme:
    name: Generate & commit README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Generate README
        run: node src/scripts/generateReadme.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet README.md && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-sync README from features.ts + SKILL.md"
          git push
