name: Publish Package

# Publishes skills-bag to npm via OIDC trusted publishing (no NPM_TOKEN).
#
# ONE-TIME SETUP (then every release is automatic):
#   1. Publish v0.1.0 once manually (npm publish --access public) to create the package.
#   2. On npmjs.com → the `skills-bag` package → Settings → Trusted Publisher,
#      add this GitHub repo (YosefHayim/skills-bag) and workflow file `publish.yml`.
#   The workflow filename `publish.yml` must stay aligned with that config —
#   renaming it invalidates the OIDC match.
#
# Triggers:
#   - push of a v*.*.* tag (e.g. `git tag v0.2.0 && git push --tags`)
#   - workflow_dispatch (manual recovery, e.g. re-publish an existing tag)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.2.0). Defaults to main HEAD.'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      INPUT_TAG: ${{ inputs.tag }}
    steps:
      - name: Resolve checkout ref
        id: ref
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "$INPUT_TAG" ]; then echo "ref=$INPUT_TAG" >> "$GITHUB_OUTPUT"; else echo "ref=main" >> "$GITHUB_OUTPUT"; fi
          else
            echo "ref=$GITHUB_REF" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Verify npm supports OIDC Trusted Publishing
        run: |
          test "$(printf '%s\n' "11.5.1" "$(npm -v)" | sort -V | head -1)" = "11.5.1" || {
            echo "::error::npm $(npm -v) is below 11.5.1; trusted publishing is not supported"
            exit 1
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Publish to npm (trusted publishing)
        run: pnpm publish --no-git-checks --access public --provenance
