name: Publish Package

# Publishes dufflebag to npm via OIDC trusted publishing (no NPM_TOKEN). A per-repo
# COPY of templates/workflows/publish.yml (kept in sync by `dufflebag scaffold-ci`),
# NOT a referenced reusable workflow: OIDC binds provenance to THIS repo AND this
# exact filename (publish.yml), so it cannot be centralized (ADR 0009).
#
# ONE-TIME SETUP (then every release is automatic):
#   1. Publish v0.1.0 once manually (npm publish --access public) to create the package.
#   2. On npmjs.com → the dufflebag package → Settings → Trusted Publisher, add this
#      repo (YosefHayim/dufflebag) and workflow file `publish.yml`. Renaming this
#      file invalidates the OIDC match.
#
# Triggers:
#   - push of a v*.*.* tag (e.g. `git tag v0.2.0 && git push --tags`)
#   - a completed `Release` workflow run (gated to success below; inert until a
#     Release workflow exists in this repo)
#   - workflow_dispatch (manual recovery, e.g. re-publish an existing tag)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.2.0). Defaults to main HEAD.'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    # Skip a workflow_run trigger that did not succeed — a failed Release must not publish.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      INPUT_TAG: ${{ inputs.tag }}
    steps:
      - name: Resolve checkout ref
        id: ref
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "$INPUT_TAG" ]; then echo "ref=$INPUT_TAG" >> "$GITHUB_OUTPUT"; else echo "ref=main" >> "$GITHUB_OUTPUT"; fi
          else
            echo "ref=$GITHUB_REF" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Verify npm supports OIDC Trusted Publishing
        run: |
          test "$(printf '%s\n' "11.5.1" "$(npm -v)" | sort -V | head -1)" = "11.5.1" || {
            echo "::error::npm $(npm -v) is below 11.5.1; trusted publishing is not supported"
            exit 1
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: ppnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: ppnpm build

      - name: Publish to npm (trusted publishing)
        run: pnpm publish --no-git-checks --access public --provenance
